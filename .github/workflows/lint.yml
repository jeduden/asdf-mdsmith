name: Lint

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Run the same shellcheck and shfmt commands the repo's CONTRIBUTING
# notes document, so a clean local run guarantees a green CI run.
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install shellcheck and shfmt
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shfmt_version=v3.10.0
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/${shfmt_version}/shfmt_${shfmt_version}_linux_amd64"
          chmod +x /tmp/shfmt
          sudo mv /tmp/shfmt /usr/local/bin/shfmt
      - name: shellcheck
        run: shellcheck -x -P SCRIPTDIR bin/* lib/*.bash
      - name: shfmt
        run: shfmt -d bin lib
